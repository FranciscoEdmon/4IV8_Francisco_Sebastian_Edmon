<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de CRUD</title>
</head>
<body>
    <header>
        <h1>Ejemplo de gestión de usuario</h1>
    </header>
    <main>
        <section class="formulario-section">
            <h2 id="form-titulo">Agregar nuevo usuario</h2>
            <form id="formulario-usuario">
                <input type="hidden" id="id-usuario">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Aqui va tu nombre" maxlength="60" required>
                    <span id="error-nombre" class="error"></span>
                </div>
                <div class="campo">
                    <label for="fecha-nacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fecha-nacimiento" required>
                    <span id="error-fecha-nacimiento" class="error"></span>
                </div>
                <div class="campo">
                    <label for="nota">Nota (0-100)</label>
                    <input type="number" id="nota" placeholder="Por ejemplo 8.5" min="0" max="100" required>
                    <span id="error-nota" class="error"></span>
                </div>
                <button type="submit" id="btn-guardar">Guardar usuario</button>
                <button type="button" id="btn-cancelar" class="btn-secundario" style="display: none;">Cancelar</button>
            </form>
        </section>
        <section class="table-section">
            <h2>Vista de Usuarios</h2>
            <p id="mensaje-carga">Cargando usuarios...</p>
            <p id="mensaje-vacio" style="display: none;">No hay usuarios registrados.</p>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Fecha de Nacimiento</th>
                        <th>Nota</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-usuarios">

                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
